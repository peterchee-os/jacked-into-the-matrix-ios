<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First G2 App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
            background: #f5f5f5;
            max-width: 600px;
            margin: 0 auto;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .status.connecting { background: #fff3cd; color: #856404; }
        .status.connected { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        button {
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
            background: #007AFF;
            color: white;
            cursor: pointer;
            width: 100%;
        }
        button:hover:not(:disabled) { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }
        .g2-display {
            background: #000;
            color: #0f0;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            font-family: monospace;
            text-align: center;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <h1>🥽 My First G2 App</h1>
    
    <div id="status" class="status connecting">
        Connecting to G2 glasses...
    </div>
    
    <div class="g2-display" id="g2Display">
        G2 Display Preview
    </div>
    
    <button onclick="showHello()" id="helloBtn" disabled>
        Say Hello on Glasses
    </button>
    
    <div class="info" id="info">
        Initializing...
    </div>

    <script type="module">
        import { waitForEvenAppBridge, TextContainerProperty, CreateStartUpPageContainer } from 'https://unpkg.com/@evenrealities/even_hub_sdk@latest/dist/index.esm.js'
        
        let bridge = null;
        const statusDiv = document.getElementById('status');
        const helloBtn = document.getElementById('helloBtn');
        const infoDiv = document.getElementById('info');
        const g2Display = document.getElementById('g2Display');
        
        async function init() {
            try {
                infoDiv.textContent = 'Loading Even SDK...';
                
                // Wait for the bridge to be ready
                bridge = await waitForEvenAppBridge();
                
                statusDiv.className = 'status connected';
                statusDiv.textContent = '✅ Connected to G2 glasses!';
                helloBtn.disabled = false;
                g2Display.textContent = 'Ready to display!';
                
                infoDiv.textContent = 'Bridge initialized successfully!\nClick the button to display on glasses.';
                
                console.log('G2 Bridge ready:', bridge);
                
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ Failed to connect';
                g2Display.textContent = 'Not connected';
                infoDiv.innerHTML = 'Error: ' + error.message + '\n\n' +
                    'Make sure you are running this in the Even Hub simulator or app.\n' +
                    'The SDK only works inside the Even Hub environment.';
                console.error('Failed to initialize:', error);
            }
        }
        
        window.showHello = async function() {
            if (!bridge) return;
            
            try {
                infoDiv.textContent = 'Creating text container...';
                
                const mainText = new TextContainerProperty({
                    xPosition: 0,
                    yPosition: 0,
                    width: 576,
                    height: 288,
                    borderWidth: 0,
                    borderColor: 5,
                    paddingLength: 4,
                    containerID: 1,
                    containerName: 'main',
                    content: 'Hello from G2! 🎉',
                    isEventCapture: 1,
                });
                
                infoDiv.textContent = 'Sending to glasses...';
                
                const result = await bridge.createStartUpPageContainer(new CreateStartUpPageContainer({
                    containerTotalNum: 1,
                    textObject: [mainText],
                }));
                
                // result: 0 = success, 1 = invalid, 2 = oversize, 3 = out of memory
                const messages = {
                    0: '✅ Success! Text displayed on glasses',
                    1: '❌ Invalid parameters',
                    2: '❌ Content oversize',
                    3: '❌ Out of memory'
                };
                
                infoDiv.textContent = messages[result] || 'Unknown result: ' + result;
                
                if (result === 0) {
                    g2Display.textContent = 'Hello from G2! 🎉';
                }
                
            } catch (error) {
                infoDiv.textContent = 'Error: ' + error.message;
                console.error('Failed to display:', error);
            }
        }
        
        // Initialize when page loads
        init();
    </script>
</body>
</html>
