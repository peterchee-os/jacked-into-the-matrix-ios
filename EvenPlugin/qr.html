<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Jacked Into The Matrix - QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #000;
            color: #0f0;
            margin: 0;
            padding: 20px;
        }
        h1 {
            margin-bottom: 10px;
        }
        p {
            margin-bottom: 30px;
            opacity: 0.8;
        }
        #qrcode {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        .url {
            margin-top: 20px;
            font-family: monospace;
            word-break: break-all;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🔌 Jacked Into The Matrix</h1>
    <p>Scan this QR code with Even Hub to install the plugin</p>
    <div id="qrcode"></div>
    <div class="url" id="url"></div>
    
    <script>
        // Get the current URL
        const currentUrl = window.location.href;
        const baseUrl = currentUrl.replace('/qr.html', '/index.html');
        
        // Display the URL
        document.getElementById('url').textContent = baseUrl;
        
        // Generate QR code
        new QRCode(document.getElementById("qrcode"), {
            text: baseUrl,
            width: 256,
            height: 256,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
